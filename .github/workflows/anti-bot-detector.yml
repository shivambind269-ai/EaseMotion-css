name: 🔍 Submission Quality & Automation Detector

# ─────────────────────────────────────────────────────────────────────────────
# Flags suspicious automation patterns on issues and PRs for manual review.
#
# Philosophy:
#   • This workflow applies INFORMATIONAL labels only — it does NOT close PRs
#     or invalidate GSSoC points unilaterally.
#   • Maintainers and GSSoC organizers make final decisions on point validity.
#   • Only SABOTAGE (deleting core .github/workflows files) results in auto-close.
#
# Labels applied:
#   • suspected-automation  — submission pattern matches automated generation
#   • needs-manual-review   — maintainer should inspect before merging
#   • spam                  — clearly empty/zero-content submission
#   (NOT applied: ai-slop, gssoc:invalid — too punitive without human review)
#
# Detection signals:
#   1. Explicit "Auto-created by cron" / "Auto generated by cron" in body
#   2. Excessive repetitive title patterns (e.g. 10+ PRs with same template)
#   3. Empty files (0 bytes) submitted
#   4. Any PR that DELETES .github/workflows/ or root config files → auto-close
# ─────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  submission-quality-check:
    name: Submission Quality & Automation Check
    runs-on: ubuntu-latest
    steps:
      - name: Check for automation patterns and quality issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const isPR    = !!context.payload.pull_request;
            const isIssue = !!context.payload.issue;
            const item    = isPR ? context.payload.pull_request : context.payload.issue;
            if (!item) return;

            const issueNumber = item.number;
            const author      = item.user.login;
            const body        = (item.body  || '').toLowerCase();
            const title       = (item.title || '').toLowerCase();

            // ── Ensure informational labels exist ─────────────────────────────
            const labelDefs = {
              'suspected-automation': { color: 'FFA500', desc: 'Submission pattern suggests automated generation — needs human review' },
              'needs-manual-review':  { color: 'FBCA04', desc: 'Maintainer should inspect this before merging' },
              'spam':                 { color: 'EE0701', desc: 'Empty or zero-content submission' },
            };
            for (const [name, meta] of Object.entries(labelDefs)) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch(e) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name, color: meta.color, description: meta.desc
                  });
                } catch(ee) {}
              }
            }

            // ─────────────────────────────────────────────────────────────────
            // SIGNAL 1: Explicit cron/bot self-declaration in body
            // ─────────────────────────────────────────────────────────────────
            const CRON_SIGNATURES = [
              'auto-created by cron',
              'auto generated by cron',
              'generated by cron',
              'auto-created by bot',
              'auto created by script',
              'generated by script',
            ];
            const hasCronSignature = CRON_SIGNATURES.some(sig => body.includes(sig));

            // ─────────────────────────────────────────────────────────────────
            // SIGNAL 2: Check PR files for empty content or core file deletion
            // ─────────────────────────────────────────────────────────────────
            const PROTECTED_PATHS = [
              '.github/workflows/',
              '.github/ISSUE_TEMPLATE/',
              '.github/scripts/',
              '.github/PULL_REQUEST_TEMPLATE',
              '.github/CODEOWNERS',
              '.gitignore',
              '.gitattributes',
              '.editorconfig',
              'package.json',
              'package-lock.json',
            ];

            let hasEmptyFiles       = false;
            let hasCoreFileDeletion = false;
            let coreFilesDeleted    = [];
            let totalAdditions      = 0;

            if (isPR) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: issueNumber,
                });

                for (const file of files) {
                  totalAdditions += file.additions;

                  // Empty file spam
                  if (file.status === 'added' && file.additions === 0 && file.changes === 0) {
                    hasEmptyFiles = true;
                  }

                  // Core framework deletion — this is never acceptable
                  if (file.status === 'removed' || file.deletions > 0) {
                    const isProtected = PROTECTED_PATHS.some(p =>
                      file.filename.startsWith(p) || file.filename === p.replace(/\/$/, '')
                    );
                    if (isProtected) {
                      hasCoreFileDeletion = true;
                      coreFilesDeleted.push(file.filename);
                    }
                  }
                }
              } catch(e) {
                console.log('Could not fetch PR files:', e.message);
              }
            }

            // ─────────────────────────────────────────────────────────────────
            // DECISION: What signals did we detect?
            // ─────────────────────────────────────────────────────────────────
            const signals = [];
            if (hasCronSignature)   signals.push('Body contains explicit cron/bot self-declaration');
            if (hasEmptyFiles)      signals.push('PR contains empty files (0 bytes added)');
            if (hasCoreFileDeletion) signals.push(`PR deletes core framework files: ${coreFilesDeleted.slice(0,3).join(', ')}`);

            // ─────────────────────────────────────────────────────────────────
            // ACTION 1: Flag automation (informational only)
            // ─────────────────────────────────────────────────────────────────
            if (hasCronSignature) {
              console.log(`⚠️ Automation detected on #${issueNumber} by @${author}: ${signals.join('; ')}`);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['suspected-automation', 'needs-manual-review'],
                });
                console.log(`  → Applied: suspected-automation + needs-manual-review`);
              } catch(e) { console.log('Label error:', e.message); }
            }

            // ─────────────────────────────────────────────────────────────────
            // ACTION 2: Flag empty submissions as spam
            // ─────────────────────────────────────────────────────────────────
            if (hasEmptyFiles && !hasCoreFileDeletion) {
              console.log(`🗑️ Empty file submission on PR #${issueNumber} by @${author}`);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['spam', 'needs-manual-review'],
                });
              } catch(e) {}
            }

            // ─────────────────────────────────────────────────────────────────
            // ACTION 3: AUTO-CLOSE core file deletions (sabotage — no ambiguity)
            // ─────────────────────────────────────────────────────────────────
            if (hasCoreFileDeletion && isPR) {
              console.log(`🚨 SABOTAGE: PR #${issueNumber} deletes core files. Auto-closing.`);
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `## 🚨 PR Automatically Closed\n\n@${author}, this PR has been closed because it **deletes core framework files** that are essential to the project:\n\n${coreFilesDeleted.map(f => `- \`${f}\``).join('\n')}\n\nContributions must only **add** files inside the \`submissions/\` directory. Modifying or deleting \`.github/workflows/\`, configuration files, or other core files is not permitted.\n\nPlease open a new PR with only your submission files.\n\n_— EaseMotion CSS Maintainer Bot_`,
                });
                await github.rest.pulls.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  pull_number: issueNumber, state: 'closed',
                });
                console.log(`  → Auto-closed PR #${issueNumber}`);
              } catch(e) { console.log('Close error:', e.message); }
            }

            if (signals.length === 0) {
              console.log(`✅ #${issueNumber} by @${author} — no automation signals detected.`);
            }
