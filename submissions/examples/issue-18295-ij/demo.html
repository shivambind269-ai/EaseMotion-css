<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18295 - Scroll Fade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18295 - Scroll Fade</div>
    <div class="fade-blocks">
      <div class="fade-block">Block 1 - Lorem ipsum dolor sit amet</div>
      <div class="fade-block">Block 2 - Consectetur adipiscing elit</div>
      <div class="fade-block">Block 3 - Sed do eiusmod tempor incididunt</div>
      <div class="fade-block">Block 4 - Ut labore et dolore magna aliqua</div>
      <div class="fade-block">Block 5 - Ut enim ad minim veniam</div>
      <div class="fade-block">Block 6 - Quis nostrud exercitation ullamco</div>
    </div>
  </div>
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.fade-block').forEach(b => observer.observe(b));
  </script>
</body>
</html>
