<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuse Button · Glow & Burn Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔥 Fuse Button</h2>
        <p class="sub">glows and "burns" fuse on hover</p>

        <!-- === FUSE BUTTON === -->
        <button class="fuse-btn" id="fuseButton">
            <!-- Fuse line that burns -->
            <div class="fuse-container">
                <div class="fuse-line">
                    <div class="fuse-burn"></div>
                    <div class="fuse-spark"></div>
                </div>
                <div class="fuse-tip"></div>
            </div>

            <!-- Button content -->
            <span class="btn-content">
                <i class="fas fa-fire"></i>
                <span>Ignite</span>
            </span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the fuse burn with glowing sparks
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('fuseButton');

            if (button) {
                // Click feedback
                button.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Reset and replay burn animation
                    const burnElement = this.querySelector('.fuse-burn');
                    const sparkElement = this.querySelector('.fuse-spark');

                    if (burnElement) {
                        burnElement.classList.remove('burning');
                        // Force reflow
                        void burnElement.offsetWidth;
                        burnElement.classList.add('burning');
                    }

                    if (sparkElement) {
                        sparkElement.classList.remove('sparking');
                        void sparkElement.offsetWidth;
                        sparkElement.classList.add('sparking');
                    }

                    console.log('🔥 Fuse ignited!');
                });

                // Trigger initial burn on load for demo
                setTimeout(() => {
                    const burnElement = button.querySelector('.fuse-burn');
                    const sparkElement = button.querySelector('.fuse-spark');

                    if (burnElement) {
                        burnElement.classList.add('burning');
                    }
                    if (sparkElement) {
                        sparkElement.classList.add('sparking');
                    }
                }, 500);

                // Reset on mouse leave
                button.addEventListener('mouseleave', function() {
                    // Optional: reset the fuse after a delay
                    // The CSS handles the burn animation reset naturally
                });

                // Re-trigger on mouse enter if it's not already burning
                button.addEventListener('mouseenter', function() {
                    const burnElement = this.querySelector('.fuse-burn');
                    const sparkElement = this.querySelector('.fuse-spark');

                    // If the burn animation is complete, restart it
                    if (burnElement && !burnElement.classList.contains('burning')) {
                        burnElement.classList.add('burning');
                    }
                    if (sparkElement && !sparkElement.classList.contains('sparking')) {
                        sparkElement.classList.add('sparking');
                    }
                });
            }

        })();
    </script>

</body>
</html>
