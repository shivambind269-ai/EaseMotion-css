<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Button · 3D Flip Reveal</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔄 Flip Button</h2>
        <p class="sub">3D flip to reveal alternative text & icon</p>

        <!-- === FLIP BUTTON === -->
        <div class="flip-container">
            <button class="flip-btn" id="flipButton">
                <!-- Front face -->
                <span class="flip-face flip-front">
                    <span class="flip-content">
                        <i class="fas fa-envelope"></i>
                        <span>Send</span>
                    </span>
                </span>

                <!-- Back face -->
                <span class="flip-face flip-back">
                    <span class="flip-content">
                        <i class="fas fa-check-circle"></i>
                        <span>Sent!</span>
                    </span>
                </span>
            </button>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the button flip to reveal the back
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('flipButton');

            if (button) {
                // Click feedback - toggle flip state
                button.addEventListener('click', function(e) {
                    // Toggle a class for click-based flip (optional)
                    this.classList.toggle('flipped');

                    // Add pulse feedback
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    console.log('🔄 Button flipped!');
                });

                // Double-click to reset
                button.addEventListener('dblclick', function(e) {
                    this.classList.remove('flipped');
                    console.log('↩️ Button reset');
                });

                // Trigger initial flip on load for demo
                setTimeout(() => {
                    button.classList.add('flipped');
                    setTimeout(() => {
                        button.classList.remove('flipped');
                    }, 1500);
                }, 500);

                // Keyboard accessibility
                button.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.classList.toggle('flipped');
                    }
                });
            }

        })();
    </script>

</body>
</html>
