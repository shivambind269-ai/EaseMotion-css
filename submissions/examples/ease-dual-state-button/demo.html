<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual-State Button · Play/Pause Toggle</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>▶️⏸️ Dual-State Button</h2>
        <p class="sub">toggles between play and pause with morph</p>

        <!-- === DUAL-STATE BUTTON === -->
        <button class="dual-btn" id="dualButton" aria-label="Toggle play/pause">
            <span class="icon-container">
                <!-- Play icon (triangle) -->
                <svg class="icon play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5,3 19,12 5,21 5,3" />
                </svg>

                <!-- Pause icon (two bars) -->
                <svg class="icon pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
            </span>
            <span class="label-text" id="labelText">Play</span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click · watch the icon morph between play and pause
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('dualButton');
            const label = document.getElementById('labelText');
            let isPlaying = false;

            function toggleState() {
                isPlaying = !isPlaying;

                // Toggle the class on the button
                button.classList.toggle('playing', isPlaying);

                // Update label
                label.textContent = isPlaying ? 'Pause' : 'Play';

                // Add pulse feedback
                button.classList.add('click-pulse');
                setTimeout(() => {
                    button.classList.remove('click-pulse');
                }, 300);

                console.log(`▶️⏸️ Toggled to: ${isPlaying ? 'Pause' : 'Play'}`);
            }

            // Click to toggle
            button.addEventListener('click', toggleState);

            // Keyboard support (Enter/Space)
            button.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleState();
                }
            });

            // Trigger initial state on load (show play)
            button.classList.remove('playing');

            // Auto-toggle demo
            setTimeout(() => {
                toggleState();
                setTimeout(() => {
                    toggleState();
                }, 1200);
            }, 500);

        })();
    </script>

</body>
</html>
