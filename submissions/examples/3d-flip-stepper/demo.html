<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flip Stepper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container">

<h1>3D Flip Stepper</h1>

<div class="stepper">

<div class="step">
    <div class="card">
        <div class="front">
            <span>1</span>
            <h3>Planning</h3>
        </div>

        <div class="back">
            <p>Create project strategy</p>
        </div>
    </div>
</div>


<div class="step">
    <div class="card">
        <div class="front">
            <span>2</span>
            <h3>Development</h3>
        </div>

        <div class="back">
            <p>Build the solution</p>
        </div>
    </div>
</div>


<div class="step">
    <div class="card">
        <div class="front">
            <span>3</span>
            <h3>Launch</h3>
        </div>

        <div class="back">
            <p>Deploy successfully</p>
        </div>
    </div>
</div>

</div>

</section>

</body>
</html>
