<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In Stepper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Fade-In Stepper</h1>
        <p>Accessible CSS animated progress steps.</p>

        <div class="stepper">

            <div class="step fade-step">
                <span>1</span>
                <h3>Design</h3>
                <p>Create the layout structure.</p>
            </div>

            <div class="step fade-step">
                <span>2</span>
                <h3>Develop</h3>
                <p>Build using clean HTML and CSS.</p>
            </div>

            <div class="step fade-step">
                <span>3</span>
                <h3>Deploy</h3>
                <p>Publish the final project.</p>
            </div>

        </div>

    </main>

</body>
</html>
