<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Loaders - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-min-h-screen ease-bg-slate-900 ease-p-8 ease-font-sans">
  
  <main class="ease-max-w-6xl ease-mx-auto">
    <div class="ease-text-center ease-mb-12 ease-fade-in">
      <h1 class="ease-text-4xl ease-font-bold ease-text-white ease-mb-4">Skeleton Loaders</h1>
      <p class="ease-text-lg ease-text-slate-400">Smooth loading placeholders for better UX</p>
    </div>

    <div class="ease-grid ease-grid-cols-1 ease-md-grid-cols-2 ease-gap-8">
      
      <!-- 1. Text Skeleton -->
      <section class="skeleton-section ease-fade-in ease-delay-100">
        <h2 class="section-title">Text Content</h2>
        <div class="skeleton-card">
          <div class="skeleton skeleton--text skeleton--w-75"></div>
          <div class="skeleton skeleton--text skeleton--w-100"></div>
          <div class="skeleton skeleton--text skeleton--w-100"></div>
          <div class="skeleton skeleton--text skeleton--w-60"></div>
        </div>
      </section>

      <!-- 2. Card Skeleton -->
      <section class="skeleton-section ease-fade-in ease-delay-200">
        <h2 class="section-title">Blog Card</h2>
        <div class="skeleton-card skeleton-card--blog">
          <div class="skeleton skeleton--image skeleton--aspect-video"></div>
          <div class="skeleton-card__content">
            <div class="skeleton skeleton--text skeleton--w-40"></div>
            <div class="skeleton skeleton--text skeleton--w-100"></div>
            <div class="skeleton skeleton--text skeleton--w-90"></div>
            <div class="skeleton-card__footer">
              <div class="skeleton skeleton--circle skeleton--w-8"></div>
              <div class="skeleton skeleton--text skeleton--w-30"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 3. Profile Skeleton -->
      <section class="skeleton-section ease-fade-in ease-delay-300">
        <h2 class="section-title">User Profile</h2>
        <div class="skeleton-card skeleton-card--profile">
          <div class="skeleton skeleton--circle skeleton--w-20"></div>
          <div class="skeleton-card__info">
            <div class="skeleton skeleton--text skeleton--w-50"></div>
            <div class="skeleton skeleton--text skeleton--w-70"></div>
            <div class="skeleton skeleton--text skeleton--w-40"></div>
          </div>
        </div>
      </section>

      <!-- 4. List Skeleton -->
      <section class="skeleton-section ease-fade-in ease-delay-400">
        <h2 class="section-title">List Items</h2>
        <div class="skeleton-card">
          <div class="skeleton-list-item">
            <div class="skeleton skeleton--circle skeleton--w-10"></div>
            <div class="skeleton-list-item__content">
              <div class="skeleton skeleton--text skeleton--w-60"></div>
              <div class="skeleton skeleton--text skeleton--w-40"></div>
            </div>
          </div>
          <div class="skeleton-list-item">
            <div class="skeleton skeleton--circle skeleton--w-10"></div>
            <div class="skeleton-list-item__content">
              <div class="skeleton skeleton--text skeleton--w-70"></div>
              <div class="skeleton skeleton--text skeleton--w-50"></div>
            </div>
          </div>
          <div class="skeleton-list-item">
            <div class="skeleton skeleton--circle skeleton--w-10"></div>
            <div class="skeleton-list-item__content">
              <div class="skeleton skeleton--text skeleton--w-55"></div>
              <div class="skeleton skeleton--text skeleton--w-35"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 5. Table Skeleton -->
      <section class="skeleton-section ease-fade-in ease-delay-500">
        <h2 class="section-title">Data Table</h2>
        <div class="skeleton-card">
          <div class="skeleton-table">
            <div class="skeleton-table__header">
              <div class="skeleton skeleton--text skeleton--w-20"></div>
              <div class="skeleton skeleton--text skeleton--w-25"></div>
              <div class="skeleton skeleton--text skeleton--w-15"></div>
              <div class="skeleton skeleton--text skeleton--w-20"></div>
            </div>
            <div class="skeleton-table__row">
              <div class="skeleton skeleton--text skeleton--w-20"></div>
              <div class="skeleton skeleton--text skeleton--w-25"></div>
              <div class="skeleton skeleton--text skeleton--w-15"></div>
              <div class="skeleton skeleton--text skeleton--w-20"></div>
            </div>
            <div class="skeleton-table__row">
              <div class="skeleton skeleton--text skeleton--w-20"></div>
              <div class="skeleton skeleton--text skeleton--w-25"></div>
              <div class="skeleton skeleton--text skeleton--w-15"></div>
              <div class="skeleton skeleton--text skeleton--w-20"></div>
            </div>
            <div class="skeleton-table__row">
              <div class="skeleton skeleton--text skeleton--w-20"></div>
              <div class="skeleton skeleton--text skeleton--w-25"></div>
              <div class="skeleton skeleton--text skeleton--w-15"></div>
              <div class="skeleton skeleton--text skeleton--w-20"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 6. Stats Skeleton -->
      <section class="skeleton-section ease-fade-in ease-delay-600">
        <h2 class="section-title">Statistics</h2>
        <div class="skeleton-card skeleton-card--stats">
          <div class="skeleton-stat">
            <div class="skeleton skeleton--text skeleton--w-30"></div>
            <div class="skeleton skeleton--text skeleton--w-50 skeleton--h-8"></div>
          </div>
          <div class="skeleton-stat">
            <div class="skeleton skeleton--text skeleton--w-25"></div>
            <div class="skeleton skeleton--text skeleton--w-45 skeleton--h-8"></div>
          </div>
          <div class="skeleton-stat">
            <div class="skeleton skeleton--text skeleton--w-35"></div>
            <div class="skeleton skeleton--text skeleton--w-55 skeleton--h-8"></div>
          </div>
        </div>
      </section>

    </div>

    <!-- Toggle Button -->
    <div class="ease-text-center ease-mt-12 ease-fade-in ease-delay-700">
      <button class="toggle-btn" id="toggleBtn">
        <span class="toggle-btn__text">Show Loaded Content</span>
      </button>
    </div>

  </main>

  <script>
    // Toggle between skeleton and loaded content (for demo)
    const toggleBtn = document.getElementById('toggleBtn');
    let isLoading = true;
    
    toggleBtn.addEventListener('click', () => {
      isLoading = !isLoading;
      document.body.classList.toggle('loaded-state', !isLoading);
      toggleBtn.querySelector('.toggle-btn__text').textContent = 
        isLoading ? 'Show Loaded Content' : 'Show Skeleton Loaders';
    });
  </script>
</body>
</html>
