<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Form Inputs - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-min-h-screen ease-bg-gradient-to-br ease-from-slate-900 ease-via-purple-950 ease-to-slate-900 ease-flex ease-items-center ease-justify-center ease-p-8 ease-font-sans">
  
  <main class="ease-w-full ease-max-w-md ease-fade-in">
    <div class="ease-text-center ease-mb-8">
      <h1 class="ease-text-3xl ease-font-bold ease-text-white ease-mb-2">Create Account</h1>
      <p class="ease-text-slate-400">Join us today</p>
    </div>

    <form class="animated-form">
      
      <!-- Text Input with Floating Label -->
      <div class="form-group">
        <input type="text" id="name" class="form-input" required />
        <label for="name" class="form-label">Full Name</label>
        <span class="form-icon">👤</span>
      </div>

      <!-- Email Input -->
      <div class="form-group">
        <input type="email" id="email" class="form-input" required />
        <label for="email" class="form-label">Email Address</label>
        <span class="form-icon">✉️</span>
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <input type="password" id="password" class="form-input" required />
        <label for="password" class="form-label">Password</label>
        <span class="form-icon">🔒</span>
        <div class="password-strength">
          <div class="strength-bar"></div>
        </div>
      </div>

      <!-- Textarea -->
      <div class="form-group form-group--textarea">
        <textarea id="bio" class="form-input form-textarea" rows="4"></textarea>
        <label for="bio" class="form-label">Bio (Optional)</label>
      </div>

      <!-- Select Dropdown -->
      <div class="form-group">
        <select id="role" class="form-input form-select" required>
          <option value="" disabled selected></option>
          <option value="developer">Developer</option>
          <option value="designer">Designer</option>
          <option value="manager">Manager</option>
        </select>
        <label for="role" class="form-label">Your Role</label>
        <span class="form-icon">💼</span>
      </div>

      <!-- Checkbox -->
      <div class="form-group form-group--checkbox">
        <input type="checkbox" id="terms" class="form-checkbox" required />
        <label for="terms" class="form-checkbox-label">
          <span class="checkbox-custom"></span>
          I agree to the Terms & Conditions
        </label>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="form-submit ease-fade-in ease-delay-500">
        <span class="submit-text">Create Account</span>
        <span class="submit-loader"></span>
      </button>

      <!-- Success Message (Hidden by default) -->
      <div class="success-message">
        <span class="success-icon">✓</span>
        <p>Account created successfully!</p>
      </div>

    </form>
  </main>

  <script>
    // Password strength indicator (minimal JS for demo)
    const passwordInput = document.getElementById('password');
    const strengthBar = document.querySelector('.strength-bar');
    
    passwordInput.addEventListener('input', (e) => {
      const value = e.target.value;
      let strength = 0;
      
      if (value.length >= 8) strength += 25;
      if (/[A-Z]/.test(value)) strength += 25;
      if (/[0-9]/.test(value)) strength += 25;
      if (/[^A-Za-z0-9]/.test(value)) strength += 25;
      
      strengthBar.style.width = strength + '%';
      
      if (strength < 50) {
        strengthBar.style.background = '#ef4444';
      } else if (strength < 75) {
        strengthBar.style.background = '#f59e0b';
      } else {
        strengthBar.style.background = '#10b981';
      }
    });

    // Form submission (demo only)
    document.querySelector('.animated-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.querySelector('.form-submit');
      btn.classList.add('form-submit--loading');
      
      setTimeout(() => {
        btn.classList.remove('form-submit--loading');
        document.querySelector('.success-message').classList.add('success-message--visible');
      }, 2000);
    });
  </script>
</body>
</html>
