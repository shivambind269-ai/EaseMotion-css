<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Futuristic AI Prompt Input Component - EaseMotion CSS</title>
  
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="demo-wrapper"> 

    <h1>Futuristic AI Prompt Input Component</h1>

    <div class="ai-prompt-container">
      <input type="text" class="ai-prompt-input ease-fade-in" placeholder="Ask anything..." />
      <button class="ai-prompt-btn ease-pulse ease-hover-grow">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
      </button>
    </div>

    <p class="description">
        This demo shows a sleek, glassmorphic AI search/prompt bar featuring a continuous animated gradient shimmer, glowing drop-shadows on focus, and a pulsating microphone button.
    </p>

  </div>

</body>
</html>
